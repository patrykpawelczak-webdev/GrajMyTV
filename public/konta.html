<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konta testerów - GrajMyTV</title>
    <link rel="icon" type="image/png" href="/img/logo-favicon.png">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/secure-access.css">
</head>
<body class="accounts-page secure-access-page">
    <main class="accounts-shell">
        <section class="accounts-panel">
            <form class="accounts-pin-card secure-access-card" id="pinForm">
                <a href="/" class="accounts-access-logo secure-access-logo" aria-label="GrajMyTV">
                    <img src="/img/logo-ikona-biale.png" alt="">
                </a>
                <h1 class="secure-access-title">Zarządzanie kontami</h1>
                <p class="secure-access-subtitle">Panel do pełnej obsługi kont</p>
                <input id="adminPin" type="hidden" autocomplete="off">
                <div class="accounts-pin-digits secure-access-digits" aria-label="PIN admina">
                    <input class="pin-digit secure-access-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Pierwsza cyfra PIN" data-pin-digit>
                    <input class="pin-digit secure-access-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Druga cyfra PIN" data-pin-digit>
                    <input class="pin-digit secure-access-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Trzecia cyfra PIN" data-pin-digit>
                    <input class="pin-digit secure-access-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Czwarta cyfra PIN" data-pin-digit>
                </div>
                <button class="sr-only secure-access-submit" type="submit">Otwórz panel</button>
            </form>

            <div class="accounts-workspace" id="accountsWorkspace" hidden>
                <div class="accounts-brand">
                    <a href="/" aria-label="GrajMyTV">
                        <img src="/img/logo-ikona-biale.png" alt="">
                    </a>
                </div>

                <form class="account-create-card" id="accountForm">
                    <div>
                        <span class="accounts-kicker">Nowe konto</span>
                        <h2>Dodaj konto</h2>
                    </div>
                    <label>
                        <span>Nick</span>
                        <input id="accountNickname" type="text" maxlength="24" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Hasło</span>
                        <input id="accountPassword" type="text" minlength="6" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Rola</span>
                        <select id="accountRole">
                            <option value="tester">Tester</option>
                            <option value="admin">Admin</option>
                            <option value="player">Gracz</option>
                        </select>
                    </label>
                    <button class="btn btn-primary btn-full" type="submit">Dodaj konto</button>
                </form>

                <section class="accounts-list-card">
                    <div class="accounts-list-head">
                        <div>
                            <span class="accounts-kicker">Supabase</span>
                            <h2>Aktywne konta</h2>
                        </div>
                        <button class="accounts-refresh" id="refreshAccountsButton" type="button">Odśwież</button>
                    </div>
                    <p class="accounts-message" id="accountsMessage" aria-live="polite"></p>
                    <div class="accounts-list" id="accountsList"></div>
                </section>
            </div>
        </section>
    </main>

    <script src="/js/accounts-admin.js"></script>
</body>
</html>
