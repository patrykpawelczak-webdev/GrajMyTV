<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra w przygotowaniu - GrajMyTV</title>
    <link rel="icon" type="image/png" href="img/logo-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="soon-page">
    <main class="soon-shell">
        <section class="soon-panel">
            <a href="/" class="soon-logo" aria-label="Wróć na stronę główną">
                <img src="img/logo-napis.png" alt="GrajMyTV">
            </a>
            <span class="soon-badge">Wkrótce</span>
            <h1>Ta gra jest jeszcze w przygotowaniu</h1>
            <p>
                Pracujemy nad zasadami, ekranem rozgrywki i trybami dla graczy. Aktualny stan zobaczysz też bezpośrednio na kartach gier.
            </p>
            <div class="soon-progress game-progress" aria-label="Status prac: Obecnie tworzone, 10%">
                <div class="game-progress-header">
                    <span>Obecnie tworzone</span>
                    <strong>10%</strong>
                </div>
                <div class="game-progress-track"><span style="width: 10%"></span></div>
            </div>
            <div class="soon-actions">
                <a href="/#gry" class="btn btn-primary">Wróć do gier</a>
                <a href="/" class="btn btn-secondary">Strona główna</a>
            </div>
        </section>
    </main>
</body>
</html>
